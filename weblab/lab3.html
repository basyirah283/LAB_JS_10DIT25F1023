    <body class="bg-light">

        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-6">

                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h1 class="h5 mb-3">Mark Calculator (PW1 + PW2)</h1>

                            <div class="mb-2">
                                <label class="form-label">Student Name</label>
                                <input type="text" id="studentName" class="form-control">
                            </div>

                            <div class="mb-2">
                                <label class="form-label">Practical Work 1 (0–100)</label>
                                <input type="number" id="pw1" class="form-control" min="0" max="100">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Practical Work 2 (0–100)</label>
                                <input type="number" id="pw2" class="form-control" min="0" max="100">
                            </div>

                            <button id="btnCalc" class="btn btn-dark w-100">Calculate</button>

                            <div id="outputBox" class="alert alert-secondary mt-3 mb-0">
                                Output will appear here
                            </div>
                        </div>
                    </div>

        <!-- footer -->

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
<script>
document.getElementById("btnCalc").addEventListener("click", function(){

    let name = document.getElementById("studentName").value;
    let pw1 = parseFloat(document.getElementById("pw1").value);
    let pw2 = parseFloat(document.getElementById("pw2").value);

    if(name === "" || isNaN(pw1) || isNaN(pw2)){
        document.getElementById("outputBox").innerHTML =
        "Please enter student name and both marks.";
        return;
    }

    let total = pw1 + pw2;
    let average = total / 2;

    document.getElementById("outputBox").innerHTML =
    "<b>Student Name:</b> " + name + "<br>" +
    "<b>PW1:</b> " + pw1 + "<br>" +
    "<b>PW2:</b> " + pw2 + "<br>" +
    "<b>Total Mark:</b> " + total + "<br>" +
    "<b>Average:</b> " + average.toFixed(2);
});
</script>
